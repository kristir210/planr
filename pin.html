<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planr</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="pin-page">

  <div class="pin-container">
    <h1 class="pin-logo">Planr</h1>
    <p class="pin-label">Enter PIN</p>

    <div class="pin-dots">
      <span class="pin-dot" id="dot-1"></span>
      <span class="pin-dot" id="dot-2"></span>
      <span class="pin-dot" id="dot-3"></span>
      <span class="pin-dot" id="dot-4"></span>
      <span class="pin-dot" id="dot-5"></span>
      <span class="pin-dot" id="dot-6"></span>
    </div>

    <p class="pin-error" id="pin-error"></p>

    <div class="pin-keypad">
      <button class="pin-key" data-num="1">1</button>
      <button class="pin-key" data-num="2">2</button>
      <button class="pin-key" data-num="3">3</button>
      <button class="pin-key" data-num="4">4</button>
      <button class="pin-key" data-num="5">5</button>
      <button class="pin-key" data-num="6">6</button>
      <button class="pin-key" data-num="7">7</button>
      <button class="pin-key" data-num="8">8</button>
      <button class="pin-key" data-num="9">9</button>
      <button class="pin-key pin-key--empty"></button>
      <button class="pin-key" data-num="0">0</button>
      <button class="pin-key pin-key--delete" id="pin-delete">⌫</button>
    </div>
  </div>

  <script type="module" src="js/pin.js"></script>
</body>
</html>
